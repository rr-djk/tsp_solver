name: Dependabot Security Report

on:
  schedule:
    - cron: '0 9 * * 1'                         # Tous les lundis à 9h
  workflow_dispatch:

jobs:
  security-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      security-events: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Query GraphQL (paginated)
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${GITHUB_REPOSITORY#*/}"

          cursor="null"
          page=0

          while true; do
            if [ "$cursor" = "null" ]; then
              cursor_json="null"
            else
              cursor_json="\"$cursor\""
            fi

            QUERY=$(jq -n \
              --arg owner "$OWNER" \
              --arg repo "$REPO" \
              --argjson cursor "$cursor_json" \
              '{query: "query($owner: String!, $repo: String!, $cursor: String) { repository(owner: $owner, name: $repo) { vulnerabilityAlerts(first: 100, states: OPEN, after: $cursor) { nodes { createdAt securityVulnerability { severity package { name } vulnerableVersionRange advisory { ghsaId summary } } } pageInfo { hasNextPage endCursor } } } }", variables: {owner: $owner, repo: $repo, cursor: $cursor}}')

            curl -s -X POST https://api.github.com/graphql \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$QUERY" \
              > "page-$page.json"

            if ! jq -e '.data.repository.vulnerabilityAlerts.pageInfo.hasNextPage' "page-$page.json" > /dev/null 2>&1; then
              break
            fi

            cursor=$(jq -r '.data.repository.vulnerabilityAlerts.pageInfo.endCursor' "page-$page.json")
            page=$((page + 1))
          done

          jq -s '{nodes: [.[].data.repository.vulnerabilityAlerts.nodes[]]}' page-*.json > security-report.json
          rm -f page-*.json

      - name: Create security label if missing
        run: |
          gh label create security \
            --color "FF0000" \
            --description "Security vulnerabilities" \
            2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue if vulnerabilities found
        run: |
          if jq -e '.nodes | length > 0' security-report.json > /dev/null 2>&1; then

            REPO_NAME="${GITHUB_REPOSITORY#*/}"

            VULNS_MD=$(jq -r '
              .nodes |
              sort_by(.createdAt) | reverse |
              sort_by(.securityVulnerability.severity | {CRITICAL: 0, HIGH: 1, MODERATE: 2, LOW: 3}[.]) |
              "| Date | Package | Sévérité | " +
              "Version Vulnérable | ID GHSA | Description |",
              "| --- | --- | --- | --- | --- | --- |",
              (.[] |
                "| \(.createdAt[0:10]) | " +
                "`\(.securityVulnerability.package.name)` | " +
                "**\(.securityVulnerability.severity)** | " +
                "`\(.securityVulnerability.vulnerableVersionRange)` | " +
                "\(.securityVulnerability.advisory.ghsaId) | " +
                "\(.securityVulnerability.advisory.summary) |"
              )
            ' security-report.json)

            cat << EOF > issue-body.md
            ## Vulnérabilités détectées dans \`$REPO_NAME\`
            
            $VULNS_MD
            
            ---
            *Rapport généré automatiquement le $(date +'%Y-%m-%d')*
          EOF

            gh issue create \
              --title "⚠️ Security Report - $REPO_NAME - $(date +'%Y-%m-%d')" \
              --body-file issue-body.md \
              --label "security"
          else
            echo "Aucune vulnérabilité ouverte détectée."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
