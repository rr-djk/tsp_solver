name: CI

on:
  push:
    paths:
      - "**/*.cpp"
      - "**/*.hpp"
      - "include/**"
      - "src/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "**/*.cpp"
      - "**/*.hpp"
      - "include/**"
      - "src/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/**"

jobs:
  compile:
    name: Build and test the project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 make valgrind libgtest-dev cmake

      - name: Set compiler to g++-14
        run: |
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          sudo update-alternatives --set g++ /usr/bin/g++-14

      - name: Build
        run: make -B

      - name: Run tests
        run: make valgrind
