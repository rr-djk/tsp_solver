name: CI

on:
  workflow_run:
    workflows: ["Publish and Maintain CI Docker Image"]
    types: [completed]
  push:
    paths: &shared_paths
      - "**/*.cpp"
      - "**/*.hpp"
      - "include/**"
      - "src/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    paths: *shared_paths

permissions:
  contents: read
  packages: read

jobs:
  compile:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Build the project
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build
        run: make -B

      - name: Upload the build artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: build_artifact
          path: build/

  memory_test:
    name: Run memory test with valgrind
    needs: compile
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download the build artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v8
        with:
          name: build_artifact

      - name: Local build artifact for act
        if: ${{ env.ACT }}
        run: make

      - name: Run valgrind test
        run: make valgrind

  unit_test:
    name: Run unit test with GTest
    needs: compile
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download the build artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v8
        with:
          name: build_artifact

      - name: Local build artifact for act
        if: ${{ env.ACT }}
        run: make

      - name: Run unit test
        run: make test
